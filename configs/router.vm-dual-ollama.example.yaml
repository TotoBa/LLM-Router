policies:
  standard:
    max_attempts_per_backend: 1
    max_backend_failures_before_cooldown: 2
    backend_cooldown_seconds: 300
    retry_on_connection_error: true
    retry_on_timeout: false
    fallback_on_limit: true
    fallback_on_5xx: true
    fallback_on_4xx: false
    fallback_on_model_not_found: true
    return_last_error_on_exhausted_backends: true
    timeout_seconds: 300

  benchmark:
    max_attempts_per_backend: 1
    max_backend_failures_before_cooldown: 2
    backend_cooldown_seconds: 300
    retry_on_connection_error: true
    retry_on_timeout: false
    fallback_on_limit: true
    fallback_on_5xx: true
    fallback_on_4xx: false
    fallback_on_model_not_found: true
    return_last_error_on_exhausted_backends: true
    timeout_seconds: 0

limit_detection:
  status_codes: [402, 403, 429]
  body_markers:
    - "rate limit"
    - "quota"
    - "limit"
    - "volume"
    - "insufficient quota"
    - "too many requests"
    - "usage limit"

logging:
  level: "INFO"
  jsonl_path: "logs/llm-router.jsonl"
  log_request_body: false
  log_response_body: false
  log_prompt_chars: false
  log_headers: false
